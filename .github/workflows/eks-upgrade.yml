name: EKS Upgrade

on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Secrets
        run: |
         if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
           echo "ACCESS KEY is EMPTY"
         else
           echo "ACCESS KEY exists"
         fi

         if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
           echo "SECRET KEY is EMPTY"
         else
           echo "SECRET KEY exists"
         fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region us-east-1 \
          --name eks-upgrade-prod

      - name: Verify Cluster Version
        run: |
          aws eks describe-cluster \
          --name eks-upgrade-prod \
          --query cluster.version

      - name: Verify Nodegroup
        run: |
          aws eks describe-nodegroup \
          --cluster-name eks-upgrade-prod \
          --nodegroup-name eks-upgrade-prod-nodes \
          --query nodegroup.version

      - name: Verify Nodes
        run: |
          kubectl get nodes

      - name: Verify Cluster Autoscaler
        run: |
          kubectl rollout status deployment/cluster-autoscaler-aws-cluster-autoscaler \
          -n kube-system

      - name: Verify AWS Load Balancer Controller
        run: |
          kubectl rollout status deployment/aws-load-balancer-controller \
          -n kube-system

      - name: Verify ArgoCD
        run: |
          kubectl rollout status deployment/argocd-server \
          -n argocd


